<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <!-- Google Fonts for typography (shared with the rest of the portfolio) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <!-- Global site styles + game-specific styles -->
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="tic-tac-toe.css" />
</head>
<body>
  <div class="container ttt-container">
    <!-- Page header: title and short instructions -->
    <header class="ttt-header">
      <a href="index.html" class="ttt-back">← Back to Portfolio</a>
      <p class="hero-eyebrow">Web Dev Project</p>
      <h1>Tic-Tac-Toe</h1>
      <p class="hero-lead">Take turns placing X and O. First to get three in a row wins.</p>
    </header>

    <!-- Main game area -->
    <section class="card ttt-game" aria-labelledby="ttt-status">
      <!-- Scoreboard: JS updates the numbers via id="score-x", etc. -->
      <div class="ttt-scoreboard">
        <div class="ttt-score ttt-score--x">
          <span class="ttt-score-label">Player X</span>
          <span class="ttt-score-value" id="score-x">0</span>
        </div>
        <div class="ttt-score ttt-score--draw">
          <span class="ttt-score-label">Draws</span>
          <span class="ttt-score-value" id="score-draw">0</span>
        </div>
        <div class="ttt-score ttt-score--o">
          <span class="ttt-score-label">Player O</span>
          <span class="ttt-score-value" id="score-o">0</span>
        </div>
      </div>

      <!-- Status message: "Player X's turn", "Player O wins!", etc. -->
      <p class="ttt-status" id="ttt-status" aria-live="polite">Player X's turn</p>

      <!--
        The 3×3 board: 9 buttons, one per cell.
        data-index="0" through "8" lets JavaScript know which cell was clicked.
        Buttons are used so cells are keyboard-accessible and clickable.
      -->
      <div class="ttt-board" id="board" role="grid" aria-label="Tic-tac-toe board">
        <button type="button" class="ttt-cell" data-index="0" aria-label="Cell 1, empty"></button>
        <button type="button" class="ttt-cell" data-index="1" aria-label="Cell 2, empty"></button>
        <button type="button" class="ttt-cell" data-index="2" aria-label="Cell 3, empty"></button>
        <button type="button" class="ttt-cell" data-index="3" aria-label="Cell 4, empty"></button>
        <button type="button" class="ttt-cell" data-index="4" aria-label="Cell 5, empty"></button>
        <button type="button" class="ttt-cell" data-index="5" aria-label="Cell 6, empty"></button>
        <button type="button" class="ttt-cell" data-index="6" aria-label="Cell 7, empty"></button>
        <button type="button" class="ttt-cell" data-index="7" aria-label="Cell 8, empty"></button>
        <button type="button" class="ttt-cell" data-index="8" aria-label="Cell 9, empty"></button>
      </div>

      <!-- Reset buttons: JS listens for clicks on these ids -->
      <div class="ttt-actions">
        <button type="button" class="button" id="reset-round">New Round</button>
        <button type="button" class="ttt-btn-secondary" id="reset-scores">Reset Scores</button>
      </div>
    </section>
  </div>

  <!-- Game logic runs after the HTML exists so we can find elements by id/class -->
  <script src="tic-tac-toe.js"></script>
</body>
</html>
